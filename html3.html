<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbanNest Real Estate</title>
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<!-- Header Start -->

<header>

    <div class="logo">
        Urban<span>Nest</span>
    </div>

    <nav>

        <a href="#">Home</a>
        <a href="#">Buy</a>
        <a href="#">Rent</a>
        <a href="#">Agents</a>
        <a href="#">Contact</a>

    </nav>

    <button class="header-btn">
        List Property
    </button>

</header>

<!-- Hero Section -->

<section class="hero">

    <div class="hero-content">

        <h4>WELCOME TO URBANEST</h4>

        <h1>
            Discover Homes<br>
            That Match Your Lifestyle
        </h1>

        <p>
            Find apartments, villas and commercial spaces
            in the best locations with trusted agents.
        </p>

        <div class="hero-buttons">

            <button class="btn1">
                Explore
            </button>

            <button class="btn2">
                Contact Us
            </button>

        </div>

    </div>

    <!-- Search Box -->

    <div class="search-box">

        <select>
            <option>Property Type</option>
            <option>Apartment</option>
            <option>Villa</option>
            <option>Office</option>
        </select>

        <select>
            <option>Location</option>
            <option>Bangalore</option>
            <option>Hyderabad</option>
            <option>Chennai</option>
        </select>

        <input type="text" placeholder="Budget">

        <button>
            <i class="fa-solid fa-magnifying-glass"></i>
            Search
        </button>

    </div>

</section>

</body>
</html>
